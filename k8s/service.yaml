# ClusterIP Service (internal access only)
apiVersion: v1
kind: Service
metadata:
  name: node-api-clusterip
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: node-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---

# NodePort Service (external access via node IP)
apiVersion: v1
kind: Service
metadata:
  name: node-api-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: node-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080   # Access via http://<NodeIP>:30080

